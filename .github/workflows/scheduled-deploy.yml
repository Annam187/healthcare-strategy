name: ⏰ Scheduled Keep-Alive — Every 23 Hours

on:
  schedule:
    # Runs every 23 hours at 00:00 UTC
    - cron: '0 0 * * *'

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual keep-alive'

jobs:
  keep-alive:
    name: ⏰ Ping Netlify Build Hook
    runs-on: ubuntu-latest

    steps:
      - name: 📋 Log trigger info
        run: |
          echo "========================================"
          echo "  Healthcare BA Intelligence Platform"
          echo "  Keep-Alive Deploy Triggered"
          echo "  Time : $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "  Event: ${{ github.event_name }}"
          echo "  Note : ${{ github.event.inputs.reason || 'Scheduled 23h cron' }}"
          echo "========================================"

      - name: 🚀 Trigger Netlify Build Hook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}")

          echo "Netlify response: HTTP $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
            echo "✅ Build hook triggered successfully!"
          else
            echo "❌ Build hook failed with HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: 🌐 Confirm site URL
        run: |
          echo "Site deploying → https://fluffy-taiyaki-ddc1f5.netlify.app"
          echo "Deploy logs   → https://app.netlify.com/sites/fluffy-taiyaki-ddc1f5/deploys"
