name: ✅ Build Verification on Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-build:
    name: Verify Build Passes
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build project
        run: npm run build

      - name: ✅ Verify build output
        run: |
          echo "========================================"
          echo "  Build verified successfully ✅"
          echo "  $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "  Netlify is auto-deploying this push..."
          echo "  Live → https://fluffy-taiyaki-ddc1f5.netlify.app"
          echo "========================================"
          ls -lh dist/
